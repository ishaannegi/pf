define host {
    use                     linux-server
    host_name               portfolio-app
    alias                   Portfolio Application
    address                 desktop-control-plane
    check_command           check_tcp!30080
    max_check_attempts      2
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               portfolio-app
    service_description     HTTP Availability
    check_command           check_http!-p 30080
    max_check_attempts      2
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
